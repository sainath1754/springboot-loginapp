<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        .emoji { font-size: 3rem; margin-bottom: 1rem; }
        h2 { color: #333; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 2rem; }
        .username { color: #4f46e5; font-weight: bold; }
        a.logout-btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #ef4444;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
        }
        a.logout-btn:hover { background: #dc2626; }
    </style>
</head>
<body>
<div class="card">
    <div class="emoji">🎉</div>
    <h2>Login Successful!</h2>

    <!-- sec:authentication reads the logged-in user's name from Spring Security context -->
    <p>Welcome, <span class="username" sec:authentication="name">User</span>!</p>
    <p>You are now logged in to the system.</p>

    <!-- Logout sends GET /logout which Spring Security handles -->
    <a href="/logout" class="logout-btn">🚪 Logout</a>
</div>
</body>
</html>
