<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        input {
            width: 100%; padding: 0.75rem 1rem;
            border: 1.5px solid #ddd; border-radius: 8px;
            font-size: 1rem; margin-bottom: 1rem;
        }
        input:focus { outline: none; border-color: #4f46e5; }
        button {
            width: 100%; padding: 0.75rem;
            background: #4f46e5; color: white;
            border: none; border-radius: 8px;
            font-size: 1rem; cursor: pointer;
        }
        button:hover { background: #4338ca; }
        .msg-error { color: #e53e3e; text-align: center; margin-bottom: 1rem; }
        .msg-success { color: #38a169; text-align: center; margin-bottom: 1rem; }
        .link { text-align: center; margin-top: 1rem; }
        .link a { color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 Login</h2>

    <!-- Show error if login failed -->
    <p th:if="${param.error}" class="msg-error">❌ Invalid username or password.</p>

    <!-- Show success if just registered -->
    <p th:if="${param.registered}" class="msg-success">✅ Registered! Please login.</p>

    <!-- Show success if just logged out -->
    <p th:if="${param.logout}" class="msg-success">👋 Logged out successfully.</p>

    <!--
        action="/login"   → Spring Security listens on POST /login
        method="post"     → Form submission
        The input names MUST be "username" and "password" — Spring Security reads these exact names
    -->
    <form th:action="@{/login}" method="post">
        <input type="text"     name="username" placeholder="Enter Username" required />
        <input type="password" name="password" placeholder="Enter Password" required />
        <button type="submit">OK — Login</button>
    </form>

    <div class="link">
        <p>No account? <a href="/register">Register here</a></p>
    </div>
</div>
</body>
</html>
